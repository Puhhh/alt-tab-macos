name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish macOS app
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build release app
        run: bash make-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 AltTabMacOS.app

      - name: Package app
        run: ditto -c -k --keepParent AltTabMacOS.app AltTabMacOS.app.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" AltTabMacOS.app.zip --clobber
          else
            gh release create "$TAG_NAME" AltTabMacOS.app.zip \
              --title "$TAG_NAME" \
              --generate-notes
          fi
